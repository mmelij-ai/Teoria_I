<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teoría Musical I - Profesor Marcelo Melipil J.</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

    <style>
        /* Estilos generales de look and feel moderno oscuro */
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
        }
        .custom-scroll::-webkit-scrollbar { height: 10px; }
        .custom-scroll::-webkit-scrollbar-track { background: #0f172a; border-radius: 8px; margin: 0 10px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; border: 2px solid #0f172a; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .piano-key { transition: background-color 0.1s, transform 0.05s; }
        .piano-key:active { transform: translateY(2px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICONOS ---
        const Play = ({ className }) => (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className={className}><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>
        );
        const Info = ({ className }) => (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
        );
        const CircleDot = ({ className }) => (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="1"></circle></svg>
        );

        // --- BASE DE DATOS DE TONALIDADES MAYORES ---
        const majorKeys = [
          { id: 'C', name: 'C Mayor', type: 'natural', accidentals: [], scale: ['C', 'D', 'E', 'F', 'G', 'A', 'B', 'C'] },
          { id: 'G', name: 'G Mayor', type: 'sharp', accidentals: ['F#'], scale: ['G', 'A', 'B', 'C', 'D', 'E', 'F#', 'G'] },
          { id: 'D', name: 'D Mayor', type: 'sharp', accidentals: ['F#', 'C#'], scale: ['D', 'E', 'F#', 'G', 'A', 'B', 'C#', 'D'] },
          { id: 'A', name: 'A Mayor', type: 'sharp', accidentals: ['F#', 'C#', 'G#'], scale: ['A', 'B', 'C#', 'D', 'E', 'F#', 'G#', 'A'] },
          { id: 'E', name: 'E Mayor', type: 'sharp', accidentals: ['F#', 'C#', 'G#', 'D#'], scale: ['E', 'F#', 'G#', 'A', 'B', 'C#', 'D#', 'E'] },
          { id: 'B', name: 'B Mayor', type: 'sharp', accidentals: ['F#', 'C#', 'G#', 'D#', 'A#'], scale: ['B', 'C#', 'D#', 'E', 'F#', 'G#', 'A#', 'B'] },
          { id: 'Cb', name: 'Cb Mayor', type: 'flat', accidentals: ['Bb', 'Eb', 'Ab', 'Db', 'Gb', 'Cb', 'Fb'], scale: ['Cb', 'Db', 'Eb', 'Fb', 'Gb', 'Ab', 'Bb', 'Cb'] },
          { id: 'F#', name: 'F# Mayor', type: 'sharp', accidentals: ['F#', 'C#', 'G#', 'D#', 'A#', 'E#'], scale: ['F#', 'G#', 'A#', 'B', 'C#', 'D#', 'E#', 'F#'] },
          { id: 'Gb', name: 'Gb Mayor', type: 'flat', accidentals: ['Bb', 'Eb', 'Ab', 'Db', 'Gb', 'Cb'], scale: ['Gb', 'Ab', 'Bb', 'Cb', 'Db', 'Eb', 'F', 'Gb'] },
          { id: 'Db', name: 'Db Mayor', type: 'flat', accidentals: ['Bb', 'Eb', 'Ab', 'Db', 'Gb'], scale: ['Db', 'Eb', 'F', 'Gb', 'Ab', 'Bb', 'C', 'Db'] },
          { id: 'C#', name: 'C# Mayor', type: 'sharp', accidentals: ['F#', 'C#', 'G#', 'D#', 'A#', 'E#', 'B#'], scale: ['C#', 'D#', 'E#', 'F#', 'G#', 'A#', 'B#', 'C#'] },
          { id: 'Ab', name: 'Ab Mayor', type: 'flat', accidentals: ['Bb', 'Eb', 'Ab', 'Db'], scale: ['Ab', 'Bb', 'C', 'Db', 'Eb', 'F', 'G', 'Ab'] },
          { id: 'Eb', name: 'Eb Mayor', type: 'flat', accidentals: ['Bb', 'Eb', 'Ab'], scale: ['Eb', 'F', 'G', 'Ab', 'Bb', 'C', 'D', 'Eb'] },
          { id: 'Bb', name: 'Bb Mayor', type: 'flat', accidentals: ['Bb', 'Eb'], scale: ['Bb', 'C', 'D', 'Eb', 'F', 'G', 'A', 'Bb'] },
          { id: 'F', name: 'F Mayor', type: 'flat', accidentals: ['Bb'], scale: ['F', 'G', 'A', 'Bb', 'C', 'D', 'E', 'F'] }
        ];

        // --- BASE DE DATOS DE TONALIDADES MENORES ---
        const minorKeys = [
          { id: 'Am', name: 'A Menor', type: 'natural', accidentals: [], scale: ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'A'], scaleHarmonic: ['A', 'B', 'C', 'D', 'E', 'F', 'G#', 'A'] },
          { id: 'Em', name: 'E Menor', type: 'sharp', accidentals: ['F#'], scale: ['E', 'F#', 'G', 'A', 'B', 'C', 'D', 'E'], scaleHarmonic: ['E', 'F#', 'G', 'A', 'B', 'C', 'D#', 'E'] },
          { id: 'Bm', name: 'B Menor', type: 'sharp', accidentals: ['F#', 'C#'], scale: ['B', 'C#', 'D', 'E', 'F#', 'G', 'A', 'B'], scaleHarmonic: ['B', 'C#', 'D', 'E', 'F#', 'G', 'A#', 'B'] },
          { id: 'F#m', name: 'F# Menor', type: 'sharp', accidentals: ['F#', 'C#', 'G#'], scale: ['F#', 'G#', 'A', 'B', 'C#', 'D', 'E', 'F#'], scaleHarmonic: ['F#', 'G#', 'A', 'B', 'C#', 'D', 'E#', 'F#'] },
          { id: 'C#m', name: 'C# Menor', type: 'sharp', accidentals: ['F#', 'C#', 'G#', 'D#'], scale: ['C#', 'D#', 'E', 'F#', 'G#', 'A', 'B', 'C#'], scaleHarmonic: ['C#', 'D#', 'E', 'F#', 'G#', 'A', 'B#', 'C#'] },
          { id: 'G#m', name: 'G# Menor', type: 'sharp', accidentals: ['F#', 'C#', 'G#', 'D#', 'A#'], scale: ['G#', 'A#', 'B', 'C#', 'D#', 'E', 'F#', 'G#'], scaleHarmonic: ['G#', 'A#', 'B', 'C#', 'D#', 'E', 'F##', 'G#'] },
          { id: 'Abm', name: 'Ab Menor', type: 'flat', accidentals: ['Bb', 'Eb', 'Ab', 'Db', 'Gb', 'Cb', 'Fb'], scale: ['Ab', 'Bb', 'Cb', 'Db', 'Eb', 'Fb', 'Gb', 'Ab'], scaleHarmonic: ['Ab', 'Bb', 'Cb', 'Db', 'Eb', 'Fb', 'G', 'Ab'] },
          { id: 'D#m', name: 'D# Menor', type: 'sharp', accidentals: ['F#', 'C#', 'G#', 'D#', 'A#', 'E#'], scale: ['D#', 'E#', 'F#', 'G#', 'A#', 'B', 'C#', 'D#'], scaleHarmonic: ['D#', 'E#', 'F#', 'G#', 'A#', 'B', 'C##', 'D#'] },
          { id: 'Ebm', name: 'Eb Menor', type: 'flat', accidentals: ['Bb', 'Eb', 'Ab', 'Db', 'Gb', 'Cb'], scale: ['Eb', 'F', 'Gb', 'Ab', 'Bb', 'Cb', 'Db', 'Eb'], scaleHarmonic: ['Eb', 'F', 'Gb', 'Ab', 'Bb', 'Cb', 'D', 'Eb'] },
          { id: 'Bbm', name: 'Bb Menor', type: 'flat', accidentals: ['Bb', 'Eb', 'Ab', 'Db', 'Gb'], scale: ['Bb', 'C', 'Db', 'Eb', 'F', 'Gb', 'Ab', 'Bb'], scaleHarmonic: ['Bb', 'C', 'Db', 'Eb', 'F', 'Gb', 'A', 'Bb'] },
          { id: 'A#m', name: 'A# Menor', type: 'sharp', accidentals: ['F#', 'C#', 'G#', 'D#', 'A#', 'E#', 'B#'], scale: ['A#', 'B#', 'C#', 'D#', 'E#', 'F#', 'G#', 'A#'], scaleHarmonic: ['A#', 'B#', 'C#', 'D#', 'E#', 'F#', 'G##', 'A#'] },
          { id: 'Fm', name: 'F Menor', type: 'flat', accidentals: ['Bb', 'Eb', 'Ab', 'Db'], scale: ['F', 'G', 'Ab', 'Bb', 'C', 'Db', 'Eb', 'F'], scaleHarmonic: ['F', 'G', 'Ab', 'Bb', 'C', 'Db', 'E', 'F'] },
          { id: 'Cm', name: 'C Menor', type: 'flat', accidentals: ['Bb', 'Eb', 'Ab'], scale: ['C', 'D', 'Eb', 'F', 'G', 'Ab', 'Bb', 'C'], scaleHarmonic: ['C', 'D', 'Eb', 'F', 'G', 'Ab', 'B', 'C'] },
          { id: 'Gm', name: 'G Menor', type: 'flat', accidentals: ['Bb', 'Eb'], scale: ['G', 'A', 'Bb', 'C', 'D', 'Eb', 'F', 'G'], scaleHarmonic: ['G', 'A', 'Bb', 'C', 'D', 'Eb', 'F#', 'G'] },
          { id: 'Dm', name: 'D Menor', type: 'flat', accidentals: ['Bb'], scale: ['D', 'E', 'F', 'G', 'A', 'Bb', 'C', 'D'], scaleHarmonic: ['D', 'E', 'F', 'G', 'A', 'Bb', 'C#', 'D'] }
        ];

        // Posiciones físicas concéntricas optimizadas en el círculo amplio (Radio mayor 160, menor 105)
        const circlePositions = [
          { pos: 0, keys: ['C'], minors: ['Am'] },
          { pos: 1, keys: ['G'], minors: ['Em'] },
          { pos: 2, keys: ['D'], minors: ['Bm'] },
          { pos: 3, keys: ['A'], minors: ['F#m'] },
          { pos: 4, keys: ['E'], minors: ['C#m'] },
          { pos: 5, keys: ['B', 'Cb'], minors: ['G#m', 'Abm'] },
          { pos: 6, keys: ['F#', 'Gb'], minors: ['D#m', 'Ebm'] },
          { pos: 7, keys: ['Db', 'C#'], minors: ['Bbm', 'A#m'] },
          { pos: 8, keys: ['Ab'], minors: ['Fm'] },
          { pos: 9, keys: ['Eb'], minors: ['Cm'] },
          { pos: 10, keys: ['Bb'], minors: ['Gm'] },
          { pos: 11, keys: ['F'], minors: ['Dm'] }
        ];

        const staffPositions = { 
          'C4': 105, 'D4': 97.5, 'E4': 90, 'F4': 82.5, 'G4': 75, 'A4': 67.5, 'B4': 60, 
          'C5': 52.5, 'D5': 45, 'E5': 37.5, 'F5': 30, 'G5': 22.5, 'A5': 15, 'B5': 7.5, 'C6': 0 
        };

        const keySigY = {
          'F#': 30, 'C#': 52.5, 'G#': 22.5, 'D#': 45, 'A#': 67.5, 'E#': 37.5, 'B#': 60,
          'Bb': 60, 'Eb': 37.5, 'Ab': 67.5, 'Db': 45, 'Gb': 75, 'Cb': 52.5, 'Fb': 82.5
        };

        // --- AUDIO ---
        let audioCtx = null;
        const initAudio = () => {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const midiToFreq = (midi) => 440 * Math.pow(2, (midi - 69) / 12);
        
        const playTone = (freq, start, dur = 0.8) => {
          if (!audioCtx) return;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.frequency.setValueAtTime(freq, start);
          gain.gain.setValueAtTime(0, start);
          gain.gain.linearRampToValueAtTime(0.2, start + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
          osc.start(start);
          osc.stop(start + dur);
        };

        const getBaseMidi = (note) => {
          const map = { 'C': 0, 'D': 2, 'E': 4, 'F': 5, 'G': 7, 'A': 9, 'B': 11 };
          let val = map[note[0]];
          if (note.includes('#')) val += 1;
          if (note.includes('b')) val -= 1;
          return val;
        };

        const getChordMidi = (r, t, f, inv) => {
          const root = getBaseMidi(r) + 60;
          let third = getBaseMidi(t) + 60; if (third < root) third += 12;
          let fifth = getBaseMidi(f) + 60; if (fifth < third) fifth += 12;
          if (inv === 1) return [third, fifth, root + 12];
          if (inv === 2) return [fifth, root + 12, third + 12];
          return [root, third, fifth];
        };

        // --- COMPONENTE PENTAGRAMA ---
        const Staff = ({ keyData, isMinor, minorMode, onPlayNote }) => {
          const scaleNotes = isMinor && minorMode === 'harmonic' ? keyData.scaleHarmonic : keyData.scale;
          
          const pitches = useMemo(() => {
            let oct = 4;
            return scaleNotes.map((n, i) => {
              if (i > 0 && n.startsWith('C')) oct++;
              return `${n}${oct}`;
            });
          }, [scaleNotes]);
          
          const startX = 100 + (keyData.accidentals.length * 15);
          const spacing = (405 - startX) / 7;

          const getAccidentalSymbol = (note, index) => {
            if (isMinor && minorMode === 'harmonic' && index === 6) {
              if (note.includes('##')) return '𝄪';
              if (note.includes('#')) return '♯';
              if (!note.includes('#') && !note.includes('b')) {
                return '♮';
              }
            }
            return null;
          };

          return (
            <div className="w-full bg-slate-900/40 rounded-xl p-4 border border-slate-700">
              <svg viewBox="0 0 440 140" className="w-full h-auto">
                {[30, 45, 60, 75, 90].map(y => (
                  <line key={y} x1="10" y1={y} x2="430" y2={y} stroke="#475569" strokeWidth="1" />
                ))}
                <text x="5" y="95" fontSize="110" fontFamily="serif" fill="#94a3b8" className="select-none">𝄞</text>
                
                {keyData.accidentals.map((acc, i) => (
                  <text key={i} x={75 + i * 15} y={keySigY[acc] + 6} fontSize="22" fill="#94a3b8" className="font-bold select-none">
                    {keyData.type === 'sharp' ? '♯' : '♭'}
                  </text>
                ))}
                
                {pitches.map((p, i) => {
                  const rawNote = scaleNotes[i];
                  const cleanNote = p.replace(/[#b]/g, '');
                  const y = staffPositions[cleanNote];
                  const x = startX + i * spacing;
                  const accSymbol = getAccidentalSymbol(rawNote, i);

                  return (
                    <g 
                      key={i} 
                      className="cursor-pointer group select-none"
                      onClick={() => onPlayNote && onPlayNote(i)}
                    >
                      {y >= 105 && <line x1={x-14} y1={105} x2={x+14} y2={105} stroke="#cbd5e1" strokeWidth="1.5" />}
                      {y <= 15 && <line x1={x-14} y1={15} x2={x+14} y2={15} stroke="#cbd5e1" strokeWidth="1.5" />}
                      
                      {accSymbol && (
                        <text 
                          x={x - 12} 
                          y={y + 6} 
                          textAnchor="end" 
                          fontSize="22" 
                          fontWeight="bold" 
                          className="fill-cyan-400 group-hover:fill-cyan-300 transition-colors duration-150 font-serif"
                        >
                          {accSymbol}
                        </text>
                      )}

                      <ellipse 
                        cx={x} 
                        cy={y} 
                        rx="8" 
                        ry="6" 
                        transform={`rotate(-15 ${x} ${y})`} 
                        className="fill-cyan-400 group-hover:fill-cyan-300 transition-colors duration-150 filter drop-shadow-[0_2px_4px_rgba(34,211,238,0.2)]" 
                      />
                      <text 
                        x={x} 
                        y={130} 
                        textAnchor="middle" 
                        fontSize="12" 
                        fontWeight="bold" 
                        className="fill-slate-400 group-hover:fill-cyan-400 transition-colors duration-150"
                      >
                        {rawNote}
                      </text>
                    </g>
                  );
                })}
              </svg>
            </div>
          );
        };

        // --- COMPONENTE PRINCIPAL ---
        function App() {
          const [activeKeyId, setActiveKeyId] = useState('C');
          const [scaleType, setScaleType] = useState('major'); 
          const [minorMode, setMinorMode] = useState('natural'); 
          const [activeChordIndex, setActiveChordIndex] = useState(null);
          const [inversion, setInversion] = useState(0);
          const [compareIndices, setCompareIndices] = useState([]);

          const activeKey = useMemo(() => {
            if (scaleType === 'major') {
              return majorKeys.find(k => k.id === activeKeyId) || majorKeys[0];
            } else {
              return minorKeys.find(k => k.id === activeKeyId) || minorKeys[0];
            }
          }, [activeKeyId, scaleType]);

          const currentPos = useMemo(() => {
            return circlePositions.find(p => p.keys.includes(activeKeyId) || p.minors.includes(activeKeyId)) || circlePositions[0];
          }, [activeKeyId]);

          const relativeMajorName = useMemo(() => {
            if (scaleType === 'minor') {
              const pos = circlePositions.find(p => p.minors.includes(activeKeyId));
              if (pos) {
                const idx = pos.minors.indexOf(activeKeyId);
                const majorId = pos.keys[idx] || pos.keys[0];
                const key = majorKeys.find(k => k.id === majorId);
                return key ? key.name : majorId + ' Mayor';
              }
            }
            return '';
          }, [activeKeyId, scaleType]);

          const keySignatureText = useMemo(() => {
            if (activeKey.accidentals.length === 0) {
              return 'Sin alteraciones';
            }
            const notes = activeKey.accidentals.map(n => n.replace('#', '♯').replace('b', '♭')).join(', ');
            const count = activeKey.accidentals.length;
            const typeStr = activeKey.type === 'sharp' ? (count === 1 ? 'sostenido' : 'sostenidos') : (count === 1 ? 'bemol' : 'bemoles');
            return `${notes} (${count} ${typeStr})`;
          }, [activeKey]);

          useEffect(() => { 
            setActiveChordIndex(null); 
            setInversion(0); 
            setCompareIndices([]);
          }, [activeKeyId, scaleType, minorMode]);

          const activeScale = useMemo(() => {
            if (scaleType === 'minor' && minorMode === 'harmonic') {
              return activeKey.scaleHarmonic;
            }
            return activeKey.scale;
          }, [activeKey, scaleType, minorMode]);

          const currentDiatonicStructures = useMemo(() => {
            if (scaleType === 'major') {
              return [
                { degree: "I", suffix: "", type: "Mayor", structure: "3M + 3m", function: "Tónica Principal" },
                { degree: "IIm", suffix: "m", type: "Menor", structure: "3m + 3M", function: "Subdominante (Reemplazo)" },
                { degree: "IIIm", suffix: "m", type: "Menor", structure: "3m + 3M", function: "Tónica (Reemplazo)" },
                { degree: "IV", suffix: "", type: "Mayor", structure: "3M + 3m", function: "Subdominante Principal" },
                { degree: "V", suffix: "", type: "Mayor", structure: "3M + 3m", function: "Dominante Principal" },
                { degree: "VIm", suffix: "m", type: "Menor", structure: "3m + 3M", function: "Tónica (Reemplazo)" },
                { degree: "VIIdim", suffix: "°", type: "Disminuida", structure: "3m + 3m", function: "Dominante (Reemplazo)" }
              ];
            } else if (minorMode === 'natural') {
              return [
                { degree: "Im", suffix: "m", type: "Menor", structure: "3m + 3M", function: "Tónica Principal" },
                { degree: "IIdim", suffix: "°", type: "Disminuida", structure: "3m + 3m", function: "Subdominante (Reemplazo)" },
                { degree: "bIII", suffix: "", type: "Mayor", structure: "3M + 3m", function: "Tónica (Reemplazo)" },
                { degree: "IVm", suffix: "m", type: "Menor", structure: "3m + 3M", function: "Subdominante Principal" },
                { degree: "Vm", suffix: "m", type: "Menor", structure: "3m + 3M", function: "Dominante modal" }, 
                { degree: "bVI", suffix: "", type: "Mayor", structure: "3M + 3m", function: "Subdominante/Tónica" },
                { degree: "bVII", suffix: "", type: "Mayor", structure: "3M + 3m", function: "Dominante Backdoor" }
              ];
            } else {
              return [
                { degree: "Im", suffix: "m", type: "Menor", structure: "3m + 3M", function: "Tónica Principal" },
                { degree: "IIdim", suffix: "°", type: "Disminuida", structure: "3m + 3m", function: "Subdominante (Reemplazo)" },
                { degree: "bIII+5", suffix: "+", type: "Aumentada", structure: "3M + 3M", function: "Tónica alterada" }, 
                { degree: "IVm", suffix: "m", type: "Menor", structure: "3m + 3M", function: "Subdominante Principal" },
                { degree: "V", suffix: "", type: "Mayor", structure: "3M + 3m", function: "Dominante Principal" },
                { degree: "bVI", suffix: "", type: "Mayor", structure: "3M + 3m", function: "Subdominante/Tónica" },
                { degree: "VIIdim", suffix: "°", type: "Disminuida", structure: "3m + 3m", function: "Dominante (Reemplazo)" }
              ];
            }
          }, [scaleType, minorMode]);

          const handleToggleCompare = (idx) => {
            setCompareIndices(prev => {
              if (prev.includes(idx)) {
                return prev.filter(i => i !== idx);
              }
              if (prev.length >= 2) {
                return [prev[1], idx];
              }
              return [...prev, idx];
            });
          };

          const comparisonResult = useMemo(() => {
            if (compareIndices.length !== 2) return null;
            
            const idx1 = compareIndices[0];
            const idx2 = compareIndices[1];
            
            const scaleNotes = activeScale;
            const chord1Notes = [
              scaleNotes[idx1], 
              scaleNotes[(idx1+2)%7], 
              scaleNotes[(idx1+4)%7]
            ];
            
            const chord2Notes = [
              scaleNotes[idx2], 
              scaleNotes[(idx2+2)%7], 
              scaleNotes[(idx2+4)%7]
            ];
            
            const common = chord1Notes.filter(n => chord2Notes.includes(n));
            
            const s1 = currentDiatonicStructures[idx1];
            const s2 = currentDiatonicStructures[idx2];
            const name1 = `${scaleNotes[idx1]}${s1.suffix}`;
            const name2 = `${scaleNotes[idx2]}${s2.suffix}`;
            
            return {
              chord1: { name: name1, degree: s1.degree, notes: chord1Notes },
              chord2: { name: name2, degree: s2.degree, notes: chord2Notes },
              commonNotes: common
            };
          }, [compareIndices, activeScale, currentDiatonicStructures]);

          const handlePlayScale = () => {
            initAudio();
            let time = audioCtx.currentTime;
            let oct = 4;
            activeScale.forEach((n, i) => {
              if (i > 0 && n.startsWith('C')) oct++;
              const freq = 440 * Math.pow(2, (( (getBaseMidi(n) + (oct+1)*12) - 69 ) / 12));
              playTone(freq, time, 0.6);
              time += 0.45;
            });
          };

          const handlePlaySingleNote = (idx) => {
            initAudio();
            let oct = 4;
            for (let j = 0; j <= idx; j++) {
              if (j > 0 && activeScale[j].startsWith('C')) oct++;
            }
            const midi = getBaseMidi(activeScale[idx]) + (oct + 1) * 12;
            playTone(midiToFreq(midi), audioCtx.currentTime, 0.8);
          };

          const handlePlayChord = (idx, inv = inversion) => {
            initAudio();
            const root = activeScale[idx];
            const third = activeScale[(idx+2)%7];
            const fifth = activeScale[(idx+4)%7];
            const midi = getChordMidi(root, third, fifth, inv);
            midi.forEach(m => playTone(midiToFreq(m), audioCtx.currentTime, 1.5));
          };

          let activeMidi = [];
          let activeLabels = {};
          if (activeChordIndex !== null) {
            const notes = [activeScale[activeChordIndex], activeScale[(activeChordIndex+2)%7], activeScale[(activeChordIndex+4)%7]];
            activeMidi = getChordMidi(notes[0], notes[1], notes[2], inversion);
            if (inversion === 0) { 
              activeLabels[activeMidi[0]] = notes[0]; activeLabels[activeMidi[1]] = notes[1]; activeLabels[activeMidi[2]] = notes[2]; 
            } else if (inversion === 1) { 
              activeLabels[activeMidi[0]] = notes[1]; activeLabels[activeMidi[1]] = notes[2]; activeLabels[activeMidi[2]] = notes[0]; 
            } else { 
              activeLabels[activeMidi[0]] = notes[2]; activeLabels[activeMidi[1]] = notes[0]; activeLabels[activeMidi[2]] = notes[1]; 
            }
          }

          const whiteKeys = []; const blackKeys = []; let wIdx = 0;
          for (let m = 60; m <= 96; m++) {
            const isB = [1,3,6,8,10].includes(m % 12);
            const active = activeMidi.includes(m);
            const label = active ? activeLabels[m].replace('#','♯').replace('b','♭').replace('##', '𝄪') : '';
            if (isB) {
              blackKeys.push(
                <div 
                  key={m} 
                  onPointerDown={(e) => { e.preventDefault(); initAudio(); playTone(midiToFreq(m), audioCtx.currentTime); }} 
                  className={`absolute z-10 piano-key rounded-b-md border-x border-b border-black cursor-pointer active:brightness-150 ${active ? 'bg-cyan-500 shadow-[0_4px_15px_rgba(34,211,238,0.5)]' : 'bg-slate-900 hover:bg-slate-800'}`} 
                  style={{ left: `calc(${wIdx * (100/22)}% - ${(100/22)*0.3}%)`, width: `${(100/22)*0.65}%`, height: '60%' }}
                >
                  {active && <span className="absolute bottom-2 w-full text-center text-[10px] font-bold text-black select-none pointer-events-none">{label}</span>}
                </div>
              );
            } else {
              whiteKeys.push(
                <div 
                  key={m} 
                  onPointerDown={(e) => { e.preventDefault(); initAudio(); playTone(midiToFreq(m), audioCtx.currentTime); }} 
                  className={`flex-1 relative piano-key border-r border-slate-400 rounded-b-md cursor-pointer active:bg-slate-300 ${active ? 'bg-cyan-100 shadow-[inset_0_-4px_15px_rgba(34,211,238,0.5)]' : 'bg-slate-200 hover:bg-slate-100'} ${m===96?'border-r-0':''}`}
                >
                  {active && (
                    <div className="absolute bottom-2 w-full flex flex-col items-center gap-1 select-none pointer-events-none">
                      <span className="text-cyan-800 font-bold text-[10px]">{label}</span>
                      <div className="w-2 h-2 bg-cyan-500 rounded-full" />
                    </div>
                  )}
                </div>
              );
              wIdx++;
            }
          }

          return (
            <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto">
              <header className="mb-8 text-center md:text-left">
                <h1 className="text-4xl font-black text-[#22d3ee]">Teoría Musical I</h1>
                <p className="text-slate-400 text-lg">Profesor Marcelo Melipil J.</p>
              </header>

              <main className="flex flex-col gap-8">
                
                {/* FILA SUPERIOR: Círculo de Quintas y Tonalidad */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                  
                  {/* Círculo Concéntrico Ampliado con excelente margen radial */}
                  <section className="bg-[#1e293b] p-8 rounded-2xl border border-slate-700 flex flex-col items-center justify-center min-h-[500px]">
                    <h2 className="text-xl font-bold text-[#22d3ee] mb-2">Círculo de Quintas</h2>
                    <p className="text-xs text-slate-400 mb-6 text-center max-w-sm">
                      Anillo Exterior: <strong className="text-cyan-400">Mayores</strong> | Anillo Interior: <strong className="text-rose-400">Menores</strong>
                    </p>
                    
                    {/* Contenedor responsivo con escala en pantallas pequeñas */}
                    <div className="w-full flex items-center justify-center overflow-hidden h-[380px] sm:h-[480px] my-2">
                      <div className="relative w-[480px] h-[480px] flex items-center justify-center select-none origin-center scale-[0.75] sm:scale-100 flex-shrink-0">
                        
                        {/* Anillo de fondo Mayor (Radio 185 -> Diámetro 370px) */}
                        <div className="absolute w-[370px] h-[370px] rounded-full border-4 border-cyan-500/20" />
                        
                        {/* Anillo de fondo Menor (Radio 125 -> Diámetro 250px) */}
                        <div className="absolute w-[250px] h-[250px] rounded-full border-4 border-rose-500/20" />
                        
                        {circlePositions.map(p => {
                          const angle = (p.pos * 30 - 90) * (Math.PI/180);
                          
                          // Externo (Mayor) - Radio ampliado a 185px
                          const activeMajor = scaleType === 'major' && p.keys.includes(activeKeyId);
                          const rMajor = 185;
                          const xMajor = Math.cos(angle) * rMajor + 240; // Centro en 240 (480/2)
                          const yMajor = Math.sin(angle) * rMajor + 240;

                          // Interno (Menor) - Radio ampliado a 125px
                          const activeMinor = scaleType === 'minor' && p.minors.includes(activeKeyId);
                          const rMinor = 125;
                          const xMinor = Math.cos(angle) * rMinor + 240;
                          const yMinor = Math.sin(angle) * rMinor + 240;

                          return (
                            <div key={p.pos}>
                              {/* Botón Mayor (Exterior) */}
                              <button 
                                onClick={() => {
                                  setScaleType('major');
                                  if (activeMajor && p.keys.length > 1) {
                                    setActiveKeyId(activeKeyId === p.keys[0] ? p.keys[1] : p.keys[0]);
                                  } else {
                                    setActiveKeyId(p.keys[0]);
                                  }
                                }} 
                                style={{ left: xMajor, top: yMajor }} 
                                className={`absolute w-12 h-12 -ml-6 -mt-6 rounded-full font-bold transition-all text-xs border flex items-center justify-center shadow-md ${
                                  activeMajor 
                                    ? 'bg-cyan-900/90 border-cyan-400 text-cyan-300 scale-110 shadow-lg shadow-cyan-500/30' 
                                    : 'bg-slate-800 border-cyan-800/30 text-slate-300 hover:border-cyan-500/50'
                                }`}
                              >
                                {p.keys.length > 1 ? `${p.keys[0]}/${p.keys[1]}` : p.keys[0]}
                              </button>

                              {/* Botón Menor (Interior) */}
                              <button 
                                onClick={() => {
                                  setScaleType('minor');
                                  if (activeMinor && p.minors.length > 1) {
                                    setActiveKeyId(activeKeyId === p.minors[0] ? p.minors[1] : p.minors[0]);
                                  } else {
                                    setActiveKeyId(p.minors[0]);
                                  }
                                }} 
                                style={{ left: xMinor, top: yMinor }} 
                                className={`absolute w-11 h-11 -ml-[22px] -mt-[22px] rounded-full font-bold transition-all border flex items-center justify-center shadow ${
                                  activeMinor 
                                    ? 'bg-rose-900/90 border-rose-400 text-rose-300 scale-110 shadow-lg shadow-rose-500/30' 
                                    : 'bg-slate-800 border-rose-800/25 text-slate-400 hover:border-rose-500/50'
                                }`}
                              >
                                {p.minors.length > 1 ? (
                                  <div className="text-[9px] leading-[1.1] flex flex-col items-center justify-center">
                                    <span>{p.minors[0]}</span>
                                    <div className="h-[1px] w-5 bg-current opacity-30 my-[1px]"></div>
                                    <span>{p.minors[1]}</span>
                                  </div>
                                ) : (
                                  <span className="text-[10px]">{p.minors[0]}</span>
                                )}
                              </button>
                            </div>
                          );
                        })}
                        
                        {/* Centro absoluto */}
                        <div className="text-center opacity-30 select-none pointer-events-none">
                          <CircleDot className="w-8 h-8 mx-auto mb-1 text-[#22d3ee]"/>
                          <span className="text-[10px] uppercase font-bold">Relativos</span>
                        </div>
                      </div>
                    </div>
                  </section>

                  {/* Panel de Tonalidad e Información de Armadura */}
                  <section className="bg-[#1e293b] p-8 rounded-2xl border border-slate-700 flex flex-col justify-center gap-6 h-full">
                    {/* Fila del Título y Botón de Play */}
                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-700/50 pb-4">
                      <div className="flex flex-wrap items-center gap-3">
                        <h2 className="text-2xl font-bold text-white">
                          Tonalidad de {activeKey.name}
                        </h2>
                        
                        {/* Interruptores de Enarmónicos si corresponde */}
                        {currentPos.keys.length > 1 && scaleType === 'major' && (
                          <div className="flex bg-slate-900 p-1 rounded-lg border border-slate-700 text-[10px]">
                            {currentPos.keys.map(k => (
                              <button key={k} onClick={() => setActiveKeyId(k)} className={`px-2 py-0.5 rounded ${activeKeyId===k?'bg-cyan-600 text-white':'text-slate-500'}`}>{k}</button>
                            ))}
                          </div>
                        )}
                        {currentPos.minors.length > 1 && scaleType === 'minor' && (
                          <div className="flex bg-slate-900 p-1 rounded-lg border border-slate-700 text-[10px]">
                            {currentPos.minors.map(k => (
                              <button key={k} onClick={() => setActiveKeyId(k)} className={`px-2 py-0.5 rounded ${activeKeyId===k?'bg-rose-600 text-white':'text-slate-500'}`}>{k}</button>
                            ))}
                          </div>
                        )}
                      </div>
                      
                      <button onClick={handlePlayScale} className="bg-cyan-600 hover:bg-cyan-500 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 transition-colors shadow-lg shadow-cyan-900/20 self-start sm:self-auto">
                        <Play className="w-4 h-4" /> Escala
                      </button>
                    </div>

                    {/* Línea de Información de la Armadura de Clave */}
                    <p className="text-sm text-slate-400 leading-relaxed">
                      <Info className="w-4 h-4 text-cyan-500 inline-block align-text-bottom mr-2"/> 
                      {scaleType === 'major' ? 'Armadura: ' : `Armadura (Relativo Mayor: ${relativeMajorName}): `}
                      <strong className="text-cyan-400 font-bold block sm:inline sm:ml-1">{keySignatureText}</strong>
                    </p>

                    {/* Switch Menor Natural / Menor Armónica */}
                    {scaleType === 'minor' && (
                      <div className="flex items-center gap-4 bg-slate-900/45 p-3 rounded-xl border border-slate-700 w-fit">
                        <span className="text-xs font-bold text-slate-300">Variante Escala Menor:</span>
                        <div className="flex bg-slate-950 p-1 rounded-lg border border-slate-800">
                          <button onClick={() => setMinorMode('natural')} className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${minorMode === 'natural' ? 'bg-cyan-600 text-white shadow' : 'text-slate-400'}`}>
                            Natural
                          </button>
                          <button onClick={() => setMinorMode('harmonic')} className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${minorMode === 'harmonic' ? 'bg-rose-600 text-white shadow' : 'text-slate-400'}`}>
                            Armónica
                          </button>
                        </div>
                      </div>
                    )}

                    <Staff keyData={activeKey} isMinor={scaleType === 'minor'} minorMode={minorMode} onPlayNote={handlePlaySingleNote} />
                  </section>
                </div>

                {/* FILA INFERIOR: Sistema Diatónico de Acordes */}
                <section className="bg-[#1e293b] p-8 rounded-2xl border border-slate-700">
                  <h3 className="text-xl font-bold text-[#22d3ee] mb-6">
                    Sistema Diatónico de Acordes: {scaleType === 'major' ? 'Modo Mayor' : minorMode === 'natural' ? 'Menor Natural' : 'Menor Armónico'}
                  </h3>
                  
                  <div className="flex overflow-x-auto gap-4 pb-6 custom-scroll">
                    {currentDiatonicStructures.map((s, i) => {
                      const sel = activeChordIndex === i;
                      const isComparing = compareIndices.includes(i);
                      const root = activeScale[i];
                      const third = activeScale[(i+2)%7];
                      const fifth = activeScale[(i+4)%7];

                      return (
                        <div key={i} onClick={() => { setActiveChordIndex(i); handlePlayChord(i); }} className={`flex-shrink-0 w-64 p-5 rounded-xl border transition-all cursor-pointer ${sel ? 'bg-slate-800 border-cyan-400 shadow-xl shadow-cyan-900/10' : isComparing ? 'bg-slate-800/60 border-cyan-800 shadow-lg' : 'bg-slate-800/40 border-slate-700 hover:border-slate-500'}`}>
                          <div className="flex justify-between items-center mb-4">
                            <div className="flex items-center gap-3" onClick={(e) => e.stopPropagation()}>
                              <span className="text-cyan-500 font-black flex items-center gap-2 select-none">
                                {s.degree}
                                {isComparing && (
                                  <span className="bg-cyan-500/15 text-cyan-300 border border-cyan-500/20 text-[9px] px-1.5 py-0.5 rounded font-black uppercase">
                                    {compareIndices.indexOf(i) === 0 ? 'A' : 'B'}
                                  </span>
                                )}
                              </span>
                              
                              <label className="flex items-center gap-1.5 cursor-pointer text-[10px] text-slate-400 hover:text-cyan-400 select-none">
                                <input 
                                  type="checkbox" 
                                  checked={isComparing}
                                  onChange={() => handleToggleCompare(i)}
                                  className="accent-cyan-500 w-3 h-3 rounded bg-slate-900 border-slate-700 cursor-pointer"
                                />
                                Comparar
                              </label>
                            </div>
                            <button 
                              onClick={(e) => { e.stopPropagation(); setActiveChordIndex(i); handlePlayChord(i); }}
                              className={`p-1 rounded hover:bg-slate-700 transition-colors ${sel ? 'text-cyan-400' : 'text-slate-500'}`}
                              title="Reproducir acorde"
                            >
                              <Play className="w-3.5 h-3.5" />
                            </button>
                          </div>
                          
                          <h4 className="text-2xl font-black text-white">{root}{s.suffix}</h4>
                          <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">{s.type}</p>
                          
                          <div className="text-xs space-y-2 border-t border-slate-700 pt-4">
                            <div className="flex justify-between">
                              <span>Notas</span>
                              <span className="font-bold text-slate-200">{root} - {third} - {fifth}</span>
                            </div>
                            <div className="flex justify-between">
                              <span>Estructura</span>
                              <span className="text-slate-300">{s.structure}</span>
                            </div>
                            <div className="flex justify-between">
                              <span>Función</span>
                              <span className="text-cyan-400 font-bold text-right leading-tight max-w-[130px]">{s.function}</span>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {/* Panel de Comparación de Acordes / Notas Comunes */}
                  <div className="mt-2 p-6 rounded-xl border border-slate-700 bg-slate-900/40">
                    {comparisonResult ? (
                      <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                        <div className="flex-1 w-full flex items-center justify-center gap-4 sm:gap-8">
                          {/* Acorde 1 */}
                          <div className="text-center bg-slate-800/80 p-4 rounded-xl border border-slate-700 w-1/3 max-w-[150px]">
                            <span className="text-xs text-cyan-400 font-bold">{comparisonResult.chord1.degree}</span>
                            <h5 className="text-xl font-black text-white mt-1">{comparisonResult.chord1.name}</h5>
                            <p className="text-xs text-slate-400 mt-2 tracking-wider">{comparisonResult.chord1.notes.join(' - ')}</p>
                          </div>
                          
                          {/* Flecha / Conector */}
                          <div className="text-slate-500 font-black text-xl">➔</div>
                          
                          {/* Acorde 2 */}
                          <div className="text-center bg-slate-800/80 p-4 rounded-xl border border-slate-700 w-1/3 max-w-[150px]">
                            <span className="text-xs text-cyan-400 font-bold">{comparisonResult.chord2.degree}</span>
                            <h5 className="text-xl font-black text-white mt-1">{comparisonResult.chord2.name}</h5>
                            <p className="text-xs text-slate-400 mt-2 tracking-wider">{comparisonResult.chord2.notes.join(' - ')}</p>
                          </div>
                        </div>

                        {/* Resultados de la comparación */}
                        <div className="flex-1 w-full text-center md:text-left border-t md:border-t-0 md:border-l border-slate-700 pt-4 md:pt-0 md:pl-6 flex flex-col justify-center">
                          <h6 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Análisis de Enlace Armónico</h6>
                          {comparisonResult.commonNotes.length > 0 ? (
                            <div>
                              <p className="text-sm text-slate-300">
                                Notas comunes encontradas:
                              </p>
                              <div className="flex flex-wrap justify-center md:justify-start gap-2 mt-2">
                                {comparisonResult.commonNotes.map(note => (
                                  <span key={note} className="bg-cyan-500/20 border border-cyan-500/40 text-cyan-300 px-3 py-1 rounded-full text-xs font-bold shadow-sm shadow-cyan-900/10">
                                    {note.replace('#', '♯').replace('b', '♭')}
                                  </span>
                                ))}
                              </div>
                            </div>
                          ) : (
                            <p className="text-sm text-amber-400 font-semibold bg-amber-500/10 border border-amber-500/20 px-4 py-3 rounded-lg flex items-center justify-center md:justify-start gap-2 leading-relaxed">
                              ⚠️ Sin notas comunes, movimiento paralelo o contrario
                            </p>
                          )}
                        </div>
                      </div>
                    ) : (
                      <div className="flex items-center gap-3 justify-center text-slate-400 text-sm py-2">
                        <span className="animate-pulse">💡</span>
                        <span>
                          Selecciona <strong>dos acordes</strong> marcando sus casillas <strong>"Comparar"</strong> para analizar sus notas comunes y enlace armónico.
                        </span>
                      </div>
                    )}
                  </div>

                  {/* Teclado Visual de Inversiones */}
                  <div className="mt-8 pt-8 border-t border-slate-700 flex flex-col items-center">
                    <div className="flex items-center gap-4 mb-8 bg-slate-900/50 p-3 rounded-xl border border-slate-700">
                      <span className="text-sm font-bold text-slate-300">Posición en el Teclado:</span>
                      <select value={inversion} onChange={(e) => { const v = parseInt(e.target.value); setInversion(v); if(activeChordIndex!==null) handlePlayChord(activeChordIndex, v); }} className="bg-slate-800 border border-slate-600 text-cyan-400 text-xs font-bold rounded-lg p-2 outline-none cursor-pointer">
                        <option value={0}>Estado Fundamental</option>
                        <option value={1}>1ra Inversión</option>
                        <option value={2}>2da Inversión</option>
                      </select>
                    </div>
                    
                    <div className="relative h-44 w-full max-w-4xl bg-slate-950 rounded-b-lg border-t-8 border-slate-900 flex shadow-2xl overflow-hidden select-none">
                      {whiteKeys}
                      {blackKeys}
                    </div>
                    <p className="mt-4 text-[10px] font-bold text-slate-600 tracking-widest uppercase">Rango: C4 a C7</p>
                  </div>
                </section>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
